<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>기대 효과</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt;
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: #FAF8F5; color: #2D2A26;
      overflow: hidden; padding: 28pt 36pt 24pt;
      display: flex; flex-direction: column;
    }
    .top {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8pt;
    }
    .section { font-size: 11pt; font-weight: 600; color: #C45A3B; }
    .page { font-size: 10pt; color: #6B6560; }
    h1 {
      font-size: 18pt; font-weight: 700; letter-spacing: -0.015em;
      line-height: 1.3; margin-bottom: 16pt; word-break: keep-all;
    }
    .grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12pt;
      flex: 1; min-height: 0; align-content: start;
    }
    .card {
      background: #F0EBE3; border: 1px solid #DDD8D0; border-radius: 12pt;
      padding: 18pt 14pt; min-height: 210pt;
      display: flex; flex-direction: column;
    }
    .badge {
      width: 26pt; height: 26pt; border-radius: 50%;
      background: #C45A3B; color: #FAF8F5;
      display: flex; align-items: center; justify-content: center;
      font-size: 12pt; font-weight: 700; margin-bottom: 12pt;
    }
    .card h2 {
      font-size: 14pt; font-weight: 700; margin-bottom: 10pt;
      word-break: keep-all; line-height: 1.3;
    }
    .card p {
      font-size: 12pt; line-height: 1.5; color: #6B6560; word-break: keep-all;
    }
    .footer {
      margin-top: auto; padding-top: 12pt;
      font-size: 10pt; color: #6B6560;
      border-top: 1px solid #DDD8D0;
    }
  </style>
</head>
<body>
  <div class="top">
    <span class="section">Highlight: 기대 효과 알아보기</span>
    <span class="page">07 / 08</span>
  </div>
  <h1>빠른 현장 판단력, 누구에게나 설명 가능한 의사결정 근거.</h1>
  <div class="grid">
    <div class="card">
      <div class="badge">1</div>
      <h2>AGILE DECISION MAKING</h2>
      <p>'감각'에 의존하지 않고,<br />정밀 계산된 발주 근거를 한 눈에 확인.</p>
    </div>
    <div class="card">
      <div class="badge">2</div>
      <h2>EXPLAINABLE NUMBERS</h2>
      <p>“왜 이 발주량인가”를<br />근거와 함께 설명 가능.</p>
    </div>
    <div class="card">
      <div class="badge">3</div>
      <h2>CUSTOMED TO STORE</h2>
      <p>업계표준이 아닌 매장 위치·규모·상권 조건을 온전히 반영.</p>
    </div>
  </div>
  <div class="footer"></div>
</body>
</html>
