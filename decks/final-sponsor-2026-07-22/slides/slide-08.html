<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>시연 · 마무리</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt;
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: #FAF8F5; color: #2D2A26;
      overflow: hidden; padding: 22pt 28pt 18pt;
      display: flex; flex-direction: column;
    }
    .top {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6pt;
    }
    .section { font-size: 11pt; font-weight: 600; color: #C45A3B; }
    .page { font-size: 10pt; color: #6B6560; }
    h1 {
      font-size: 16pt; font-weight: 700; letter-spacing: -0.015em;
      line-height: 1.3; margin-bottom: 10pt; word-break: keep-all;
    }
    .main {
      display: grid; grid-template-columns: 1.55fr 1fr; gap: 12pt;
      flex: 1; min-height: 0; margin-bottom: 10pt;
    }
    .video-wrap {
      background: #2D2A26; border-radius: 10pt; overflow: hidden;
      border: 1px solid #DDD8D0;
      display: flex; align-items: center; justify-content: center;
      min-height: 0;
    }
    video {
      width: 100%; height: 100%;
      max-height: 250pt;
      object-fit: contain;
      background: #2D2A26;
      display: block;
    }
    .side {
      display: flex; flex-direction: column; gap: 8pt; min-height: 0;
    }
    .box {
      background: #F0EBE3; border: 1px solid #DDD8D0; border-radius: 10pt;
      padding: 12pt;
    }
    .box.accent {
      background: #C45A3B; border-color: #C45A3B; color: #FAF8F5;
    }
    .box .k {
      font-size: 9pt; font-weight: 700; letter-spacing: 0.03em;
      color: #C45A3B; margin-bottom: 4pt;
    }
    .box.accent .k { color: rgba(250,248,245,0.85); }
    .box .v {
      font-size: 12pt; font-weight: 700; line-height: 1.4; word-break: keep-all;
    }
    .box .u {
      font-size: 11pt; font-weight: 600; color: #C45A3B;
      word-break: break-all; margin-top: 4pt;
    }
    .box p {
      font-size: 11pt; line-height: 1.45; color: #6B6560; word-break: keep-all;
    }
    .box.accent p, .box.accent .v { color: #FAF8F5; }
    .footer {
      margin-top: auto; padding-top: 8pt;
      display: flex; justify-content: space-between;
      font-size: 10pt; color: #6B6560;
      border-top: 1px solid #DDD8D0;
    }
  </style>
</head>
<body>
  <div class="top">
    <span class="section">FINALE: 시연 및 발표 마무리</span>
    <span class="page">08 / 08</span>
  </div>
  <h1>실제로 이렇게 돌아갑니다 · 약 36초</h1>
  <div class="main">
    <div class="video-wrap">
      <video
        controls
        playsinline
        preload="metadata"
        poster="./assets/demo-poster.png"
      >
        <source src="./assets/demo-walkthrough.mp4" type="video/mp4" />
        시연 영상을 재생할 수 없으면 오른쪽 URL로 접속해 주세요.
      </video>
    </div>
    <div class="side">
      <div class="box accent">
        <div class="k">SUMMARY</div>
        <div class="v">매장 정보를 입력하면,<br />그 매장에 맞는 발주 기준과 이유를 제안함.</div>
      </div>
      <div class="box">
        <div class="k">LIVE DEMO</div>
        <div class="v">아래 링크에 접속하면 라이브 데모 시연 가능.</div>
        <div class="u">baljumatch.vercel.app</div>
      </div>
      <div class="box">
        <div class="k">영상 내용</div>
        <p>시연 매장 선택 → 분석 → 비교 리포트·근거 확인</p>
      </div>
    </div>
  </div>
  <div class="footer">
    <span>권태원 · 발주맞춤 · OrderFit | End of Document</span>
  </div>
</body>
</html>
