<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>어떻게 쓰나요</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt;
      font-family: 'Pretendard', -apple-system, sans-serif;
      background: #FAF8F5; color: #2D2A26;
      overflow: hidden; padding: 28pt 36pt 24pt;
      display: flex; flex-direction: column;
    }
    .top {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8pt;
    }
    .section { font-size: 11pt; font-weight: 600; color: #C45A3B; }
    .page { font-size: 10pt; color: #6B6560; }
    h1 {
      font-size: 20pt; font-weight: 700; letter-spacing: -0.015em;
      line-height: 1.3; margin-bottom: 18pt; word-break: keep-all;
    }
    .flow {
      display: grid; grid-template-columns: 1fr 24pt 1fr 24pt 1fr;
      gap: 0; align-items: stretch; flex: 1; min-height: 0; align-content: start;
    }
    .step {
      background: #F0EBE3; border: 1px solid #DDD8D0; border-radius: 12pt;
      padding: 18pt 14pt; min-height: 210pt;
      display: flex; flex-direction: column;
    }
    .num {
      width: 28pt; height: 28pt; border-radius: 50%;
      background: #C45A3B; color: #FAF8F5;
      display: flex; align-items: center; justify-content: center;
      font-size: 13pt; font-weight: 700; margin-bottom: 12pt;
    }
    .step h2 { font-size: 15pt; font-weight: 700; margin-bottom: 10pt; }
    .step p {
      font-size: 12pt; line-height: 1.5; color: #6B6560; word-break: keep-all;
    }
    .arrow {
      display: flex; align-items: center; justify-content: center;
      color: #C45A3B; font-size: 16pt; font-weight: 700;
    }
    .footer {
      margin-top: auto; padding-top: 12pt;
      font-size: 10pt; color: #6B6560;
      border-top: 1px solid #DDD8D0;
    }
  </style>
</head>
<body>
  <div class="top">
    <span class="section">Ingestion: 서비스 흐름에 몸을 맡기기</span>
    <span class="page">04 / 08</span>
  </div>
  <h1>"입력 → 분석 → 제안" 3단계,<br />그 이상은 필요 없음.</h1>
  <div class="flow">
    <div class="step">
      <div class="num">1</div>
      <h2>INPUT</h2>
      <p>매장 유형·규모·위치·상권·일 판매량.</p>
    </div>
    <div class="arrow" aria-hidden="true">→</div>
    <div class="step">
      <div class="num">2</div>
      <h2>ANALYSIS</h2>
      <p>동일 입력, 동일 출력.<br />도출된 수치를 근거와 함께 제시.</p>
    </div>
    <div class="arrow" aria-hidden="true">→</div>
    <div class="step">
      <div class="num">3</div>
      <h2>SUGGESTION</h2>
      <p>발주 시점·안전재고·1회 발주량을 표준과 비교해 제안.<br />최종 의사결정은 담당자 몫.</p>
    </div>
  </div>
  <div class="footer">NOT AUTOMATION, BUT EXPLAINABLE SUGGESTION.</div>
</body>
</html>
