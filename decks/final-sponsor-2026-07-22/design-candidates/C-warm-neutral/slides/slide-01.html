<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>C · Warm Neutral — Cover</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1280px; height: 720px; overflow: hidden; font-family: Pretendard, "Noto Sans KR", sans-serif; }
  .slide {
    width: 1280px; height: 720px;
    background: #FAF8F5;
    color: #2D2A26;
    position: relative;
    padding: 64px 72px 52px;
  }
  .eyebrow {
    font-size: 14px; font-weight: 600; letter-spacing: 0.06em;
    color: #C45A3B; margin-bottom: 28px;
  }
  h1 {
    font-size: 52px; font-weight: 700; letter-spacing: -0.02em;
    line-height: 1.22; max-width: 920px;
  }
  .sub {
    margin-top: 24px; font-size: 21px; line-height: 1.5;
    color: #6B6560; max-width: 860px; font-weight: 400;
  }
  .panel {
    margin-top: 44px;
    background: #F0EBE3;
    border: 1px solid #DDD8D0;
    border-radius: 12px;
    padding: 22px 28px;
    display: flex; gap: 28px; align-items: center;
    max-width: 900px;
  }
  .panel .item {
    font-size: 16px; font-weight: 600; color: #2D2A26;
  }
  .panel .item span {
    display: block; font-size: 13px; font-weight: 400;
    color: #6B6560; margin-top: 4px;
  }
  .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #C45A3B; flex-shrink: 0;
  }
  .footer {
    position: absolute; left: 72px; right: 72px; bottom: 40px;
    display: flex; justify-content: space-between;
    font-size: 14px; color: #6B6560;
  }
  .accent-bar {
    position: absolute; left: 0; top: 0; bottom: 0; width: 8px;
    background: #C45A3B;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="accent-bar"></div>
    <p class="eyebrow">2026.07.22 · 최종 발표 · 경기도기술학교 북부캠퍼스</p>
    <h1>매장마다 다른 발주 기준,<br/>한 번에 맞춥니다</h1>
    <p class="sub">매장·상권 정보를 넣으면 안전재고와 발주 시점을 자동으로 제안하는 매장 특화 재고 운영 도구</p>
    <div class="panel">
      <div class="item">목적<span>왜 만들었나</span></div>
      <div class="dot"></div>
      <div class="item">기능<span>무엇을 하나</span></div>
      <div class="dot"></div>
      <div class="item">효과<span>무엇이 좋아지나</span></div>
      <div class="dot"></div>
      <div class="item">시연<span>실제로 보는 화면</span></div>
    </div>
    <div class="footer">
      <span>권태원 · 발주맞춤 · OrderFit</span>
      <span>후보 C · warm-neutral</span>
    </div>
  </div>
</body>
</html>
