<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>B · Content sample</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1280px; height: 720px; overflow: hidden; font-family: Pretendard, "Noto Sans KR", sans-serif; }
  .slide {
    width: 1280px; height: 720px;
    background: #FFFFFF;
    color: #1A1A1A;
    position: relative;
  }
  .band {
    height: 72px;
    background: #0B2C5C;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px; color: #fff;
  }
  .band .left { font-size: 15px; font-weight: 600; }
  .band .right { font-size: 13px; opacity: 0.85; }
  .body { padding: 36px 48px 40px; }
  h1 {
    font-size: 32px; font-weight: 800; color: #0B2C5C;
    margin-bottom: 24px; letter-spacing: -0.015em;
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .card {
    background: #E8F1FB;
    border: 1px solid #C5D2E3;
    border-radius: 4px;
    padding: 22px 20px;
    min-height: 340px;
  }
  .num {
    font-size: 13px; font-weight: 800; color: #1B66C9;
    letter-spacing: 0.06em; margin-bottom: 12px;
  }
  .card h2 {
    font-size: 22px; font-weight: 800; color: #0B2C5C;
    margin-bottom: 14px; line-height: 1.3;
  }
  .card p {
    font-size: 16px; line-height: 1.55; color: #5C6470;
  }
  .footer {
    position: absolute; left: 48px; right: 48px; bottom: 24px;
    font-size: 12px; color: #5C6470;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="band">
      <span class="left">주요 기능</span>
      <span class="right">02 / 06</span>
    </div>
    <div class="body">
      <h1>세 가지만 알면 됩니다</h1>
      <div class="grid">
        <div class="card">
          <div class="num">STEP 01</div>
          <h2>입력</h2>
          <p>매장 유형, 규모, 위치, 상권, 하루 판매량을 넣습니다. 전문 용어 없이 선택지로 진행합니다.</p>
        </div>
        <div class="card">
          <div class="num">STEP 02</div>
          <h2>분석</h2>
          <p>같은 입력에는 같은 결과가 나옵니다. 왜 이 숫자인지 근거와 함께 보여 줍니다.</p>
        </div>
        <div class="card">
          <div class="num">STEP 03</div>
          <h2>제안</h2>
          <p>언제 발주할지, 얼마나 남겨둘지, 한 번에 얼마나 받을지를 표준과 비교해 제안합니다.</p>
        </div>
      </div>
    </div>
    <div class="footer">후보 B · 정책·공식 보고서형 · 상단 네이비 밴드가 기관 발표 톤</div>
  </div>
</body>
</html>
