<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>D · Sage Professional — Cover</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1280px; height: 720px; overflow: hidden; font-family: Pretendard, "Noto Sans KR", sans-serif; }
  .slide {
    width: 1280px; height: 720px;
    background: #B8C4B8;
    color: #1A1A1A;
    position: relative;
    padding: 56px 64px 48px;
  }
  .panel {
    background: #F8FAF8;
    border: 1px solid #9AA89A;
    border-radius: 16px;
    height: 100%;
    padding: 52px 56px 40px;
    display: flex; flex-direction: column;
  }
  .eyebrow {
    font-size: 14px; font-weight: 600; letter-spacing: 0.05em;
    color: #3D3D3D; margin-bottom: 24px;
  }
  h1 {
    font-size: 48px; font-weight: 700; letter-spacing: -0.02em;
    line-height: 1.22; max-width: 900px;
  }
  .sub {
    margin-top: 20px; font-size: 20px; line-height: 1.5;
    color: #3D3D3D; max-width: 820px;
  }
  .chips { display: flex; gap: 10px; margin-top: auto; padding-top: 36px; }
  .chip {
    background: #B8C4B8;
    color: #1A1A1A;
    padding: 10px 16px; border-radius: 999px;
    font-size: 14px; font-weight: 600;
  }
  .meta {
    margin-top: 28px;
    display: flex; justify-content: space-between;
    font-size: 14px; color: #3D3D3D;
    border-top: 1px solid #9AA89A; padding-top: 16px;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="panel">
      <p class="eyebrow">2026.07.22 · 최종 발표 · 경기도기술학교 북부캠퍼스</p>
      <h1>매장마다 다른 발주 기준,<br/>한 번에 맞춥니다</h1>
      <p class="sub">매장·상권 정보를 넣으면 안전재고와 발주 시점을 자동으로 제안하는 매장 특화 재고 운영 도구</p>
      <div class="chips">
        <span class="chip">목적</span>
        <span class="chip">기능</span>
        <span class="chip">효과</span>
        <span class="chip">시연</span>
      </div>
      <div class="meta">
        <span>권태원 · 발주맞춤 · OrderFit</span>
        <span>후보 D · sage-professional</span>
      </div>
    </div>
  </div>
</body>
</html>
