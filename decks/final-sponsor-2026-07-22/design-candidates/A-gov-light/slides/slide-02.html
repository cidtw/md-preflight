<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>A · Content sample</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1280px; height: 720px; overflow: hidden; font-family: Pretendard, "Noto Sans KR", sans-serif; }
  .slide {
    width: 1280px; height: 720px;
    background: #E7F1FA;
    color: #1C2848;
    position: relative;
    padding: 48px 56px 40px;
  }
  .top {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 28px;
  }
  .section {
    font-size: 13px; font-weight: 700; color: #0F41BD; letter-spacing: 0.06em;
  }
  .page { font-size: 13px; color: #6B7787; }
  h1 {
    font-size: 34px; font-weight: 800; color: #172A88;
    letter-spacing: -0.015em; margin-bottom: 28px; line-height: 1.3;
  }
  .grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px;
  }
  .card {
    background: #fff;
    border: 1px solid #C5D3E2;
    border-radius: 8px;
    overflow: hidden;
    min-height: 320px;
  }
  .card-h {
    background: #1A4BC6; color: #fff;
    padding: 14px 18px; font-size: 16px; font-weight: 700;
  }
  .card-b { padding: 20px 18px; font-size: 17px; line-height: 1.55; color: #3C4860; }
  .card-b strong { color: #1C2848; display: block; font-size: 20px; margin-bottom: 10px; }
  .footer {
    position: absolute; left: 56px; right: 56px; bottom: 28px;
    font-size: 13px; color: #6B7787;
    border-top: 1px solid #C5D3E2; padding-top: 12px;
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="top">
      <span class="section">주요 기능</span>
      <span class="page">02</span>
    </div>
    <h1>세 가지만 알면 됩니다</h1>
    <div class="grid">
      <div class="card">
        <div class="card-h">1. 입력</div>
        <div class="card-b">
          <strong>매장 정보 입력</strong>
          매장 유형, 규모, 위치, 상권, 하루 판매량을 넣습니다. 전문 용어 없이 선택지로 진행합니다.
        </div>
      </div>
      <div class="card">
        <div class="card-h">2. 분석</div>
        <div class="card-b">
          <strong>자동 계산</strong>
          같은 입력에는 같은 결과가 나옵니다. 왜 이 숫자인지 근거와 함께 보여 줍니다.
        </div>
      </div>
      <div class="card">
        <div class="card-h">3. 제안</div>
        <div class="card-b">
          <strong>발주 기준 제안</strong>
          언제 발주할지, 얼마나 남겨둘지, 한 번에 얼마나 받을지를 표준과 비교해 제안합니다.
        </div>
      </div>
    </div>
    <div class="footer">후보 A · 공공·교육 기관형 라이트 네이비 · 카드 헤더로 구조가 선명</div>
  </div>
</body>
</html>
