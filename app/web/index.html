<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MD Preflight — 프로모션 사전검수</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2032%2032'%3E%3Crect%20x='6'%20y='6'%20width='20'%20height='20'%20rx='6'%20fill='%23171717'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/styles.css" />
  <script>
    // 페인트 전에 테마를 적용해 깜빡임(FOUC) 방지.
    (function () {
      try {
        var pref = localStorage.getItem("mdp-theme") || "system";
        var dark = pref === "dark" || (pref === "system" &&
          window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
        document.documentElement.dataset.themePref = pref;
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="top-nav">
    <div class="nav-inner">
      <div class="wordmark">
        <span class="wordmark-dot" aria-hidden="true"></span>
        MD&nbsp;Preflight
      </div>
      <div class="nav-right">
        <span class="nav-meta">유통 프로모션 사전검수</span>
        <div class="theme-toggle" role="group" aria-label="테마 선택">
          <button type="button" class="theme-btn" data-theme-set="light" title="라이트" aria-label="라이트 테마">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M4 12H2M22 12h-2M5.6 5.6 4.2 4.2M19.8 19.8l-1.4-1.4M18.4 5.6l1.4-1.4M4.2 19.8l1.4-1.4"/></svg>
          </button>
          <button type="button" class="theme-btn" data-theme-set="dark" title="다크" aria-label="다크 테마">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="currentColor"><path d="M20 14.5A8 8 0 0 1 9.5 4a0.5 0.5 0 0 0-.7-.6 9 9 0 1 0 11.8 11.8 0.5 0.5 0 0 0-.6-.7Z"/></svg>
          </button>
          <button type="button" class="theme-btn" data-theme-set="system" title="시스템" aria-label="시스템 테마">
            <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="1.5"/><path d="M8 20h8M12 16v4"/></svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- ───────── Upload view ───────── -->
    <section id="view-upload" class="view">
      <div class="page-head">
        <p class="eyebrow">Preflight</p>
        <h1 class="display-lg">등록 전에, 리스크를 먼저 잡는다.</h1>
        <p class="lede">
          프로모션 계획 · 상품 마스터 · 재고 파일을 올리면 가격 · 기간 · 마진 · 재고 ·
          증정 조건의 운영 리스크를 <strong>정해진 규칙으로 자동</strong> 검수합니다.
        </p>
      </div>

      <div class="dropzone-grid" id="dropzones">
        <!-- dropzones injected by app.js -->
      </div>

      <div class="run-bar">
        <label class="llm-toggle">
          <input type="checkbox" id="use-llm" checked />
          <span class="switch" aria-hidden="true"></span>
          <span class="llm-label">
            AI 설명 생성
            <span class="caption mute">끄면 미리 정해둔 문구로 검수 (오프라인 안전)</span>
          </span>
        </label>
        <button id="run-btn" class="btn btn-primary" disabled>검수 실행</button>
      </div>
    </section>

    <!-- ───────── Loading view ───────── -->
    <section id="view-loading" class="view hidden">
      <div class="loading">
        <span class="spinner" aria-hidden="true"></span>
        <p class="body">검수 중… 파일을 대조하고 규칙 10개를 적용하고 있습니다.</p>
      </div>
    </section>

    <!-- ───────── Result view ───────── -->
    <section id="view-result" class="view hidden">
      <div class="result-head">
        <button id="back-btn" class="btn btn-ghost">← 다시 검수</button>
        <a id="download-md" class="btn btn-secondary" href="#" download>Markdown 리포트</a>
      </div>

      <div id="verdict" class="verdict"></div>
      <div id="stats" class="stat-grid"></div>

      <div class="result-section">
        <h2 class="display-sm section-title">이슈 <span id="issue-count" class="count-chip"></span></h2>
        <div id="issues" class="issue-list"></div>
      </div>

      <div class="result-section">
        <h2 class="display-sm section-title">AI 요약</h2>
        <div id="ai-summary" class="ai-panel"></div>
      </div>

      <div class="result-section">
        <h2 class="display-sm section-title">담당자 체크리스트</h2>
        <ul id="checklist" class="checklist"></ul>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden" role="alert"></div>

  <script src="/static/app.js"></script>
</body>
</html>
