<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>매장 특화 ROP 재조정</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header>
        <p class="eyebrow">MD Preflight · ROP redesign</p>
        <h1>매장 특화 Lead Time / ROP 재조정</h1>
        <p class="lede">
          매장·상권·접근성 파라미터를 입력하면 내부 점수 연산과 지식 베이스 매칭으로
          재조정값과 근거 리포트를 제시합니다. (입력 → 연산 → 출력)
        </p>
        <p class="meta">version __APP_VERSION__</p>
      </header>

      <section id="input-panel" class="card">
        <h2>1. 입력</h2>
        <form id="eval-form"></form>
        <p id="form-error" class="error" hidden></p>
        <button type="submit" form="eval-form" id="submit-btn">분석 실행</button>
      </section>

      <section id="loading-panel" class="card loading" hidden>
        <p class="spinner" aria-hidden="true"></p>
        <p>매장 특화 점수를 연산하고 지식 베이스를 매칭하는 중…</p>
      </section>

      <section id="result-panel" hidden></section>
    </main>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
