<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: #F5F5F0; color: #1A1A1A;
  padding: 34pt 42pt 28pt;
  overflow: hidden;
  display: flex; flex-direction: column;
}
body.dark { background: #1A1A1A; color: #F5F5F0; }
.eyebrow {
  font-size: 10pt; font-weight: 600; color: #666666;
  letter-spacing: 0.1em; text-transform: uppercase;
}
body.dark .eyebrow { color: #999999; }
h1 {
  font-size: 24pt; font-weight: 700; letter-spacing: -0.02em;
  line-height: 1.28; word-break: keep-all; margin-top: 10pt;
}
body.dark h1 { color: #F5F5F0; }
.key {
  font-size: 13.5pt; font-weight: 500; color: #666666;
  line-height: 1.45; margin-top: 8pt; word-break: keep-all; max-width: 580pt;
}
body.dark .key { color: #B0B0B0; }
.main { flex: 1; margin-top: 16pt; min-height: 0; }
.footer {
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid #D4D4D0; padding-top: 10pt; margin-top: auto;
  font-size: 10pt; color: #999999;
}
body.dark .footer { border-top-color: #333; color: #888; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16pt; height: 100%; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12pt; height: 100%; }
.card {
  background: #E8E8E3; border-radius: 6pt; padding: 14pt 16pt;
  display: flex; flex-direction: column; gap: 6pt;
}
body.dark .card { background: #2A2A2A; }
.card h3 { font-size: 12pt; font-weight: 700; word-break: keep-all; }
.card p, .card li { font-size: 11pt; color: #666666; line-height: 1.4; word-break: keep-all; }
body.dark .card p, body.dark .card li { color: #B0B0B0; }
.card ul { margin-left: 12pt; }
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10pt; }
.stat {
  background: #E8E8E3; border-radius: 6pt; padding: 14pt 12pt;
  display: flex; flex-direction: column; gap: 4pt;
}
.stat .n { font-size: 22pt; font-weight: 700; letter-spacing: -0.02em; }
.stat .l { font-size: 10pt; color: #666666; line-height: 1.3; word-break: keep-all; }
.list { list-style: none; display: flex; flex-direction: column; gap: 8pt; }
.list li {
  font-size: 12.5pt; line-height: 1.4; word-break: keep-all;
  padding-left: 14pt; position: relative;
}
.list li::before {
  content: ""; position: absolute; left: 0; top: 7pt;
  width: 5pt; height: 5pt; border-radius: 50%; background: #1A1A1A;
}
.flow {
  display: flex; align-items: stretch; gap: 8pt; height: 100%;
}
.flow-step {
  flex: 1; background: #E8E8E3; border-radius: 6pt; padding: 14pt;
  display: flex; flex-direction: column; gap: 8pt;
}
.flow-step .num {
  font-size: 10pt; font-weight: 700; color: #666; letter-spacing: 0.06em;
}
.flow-step h3 { font-size: 14pt; font-weight: 700; word-break: keep-all; }
.flow-step p { font-size: 11pt; color: #666; line-height: 1.4; word-break: keep-all; }
.arrow { display: flex; align-items: center; color: #999; font-size: 16pt; font-weight: 300; }
.chip-row { display: flex; flex-wrap: wrap; gap: 6pt; margin-top: 8pt; }
.chip {
  font-size: 10pt; font-weight: 600; padding: 4pt 10pt;
  border-radius: 999pt; background: #1A1A1A; color: #F5F5F0;
}
.chip.ghost { background: transparent; border: 1px solid #D4D4D0; color: #1A1A1A; }
.formula {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 11pt; line-height: 1.55; background: #E8E8E3;
  border-radius: 6pt; padding: 12pt 14pt; word-break: break-all;
}
.steps { display: flex; flex-direction: column; gap: 7pt; }
.step {
  display: grid; grid-template-columns: 28pt 1fr; gap: 10pt; align-items: start;
}
.step .i {
  width: 24pt; height: 24pt; border-radius: 50%; background: #1A1A1A; color: #F5F5F0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11pt; font-weight: 700;
}
.step p { font-size: 12pt; line-height: 1.4; word-break: keep-all; padding-top: 3pt; }
.col-title { font-size: 11pt; font-weight: 700; color: #666; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6pt; }
</style>
</head>
<body>

  <div>
    <div class="eyebrow">Agenda</div>
    <h1>오늘 이야기</h1>
    <p class="key">피벗 → 제품 → 문헌 근거 → 좁은 스코프 데모</p>
  </div>

  <div class="main">
    <ol class="list" style="counter-reset: a; list-style: none;">
      <li><strong>01</strong> &nbsp; 문제와 v1 해법 (main 아카이브)</li>
      <li><strong>02</strong> &nbsp; 중간발표 → 피벗 → 튜터 피드백</li>
      <li><strong>03</strong> &nbsp; 새 제품: 매장 특화 ROP</li>
      <li><strong>04</strong> &nbsp; 아키텍처 · 공식 + 문헌 근거</li>
      <li><strong>05</strong> &nbsp; 지도·일시 유동 · 정확도 패치</li>
      <li><strong>06</strong> &nbsp; 좁은 스코프 데모 · 검증 · 로드맵</li>
    </ol>
  </div>

  <div class="footer">
    <span>MD Preflight · pivot/project-direction</span>
    <span>02 / 14</span>
  </div>
</body>
</html>
