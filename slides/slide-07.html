<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Manrope', 'Pretendard', sans-serif;
      background: #030414;
      color: #FFFFFF;
      padding: 48pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }
    .header {
      font-size: 11pt;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #0028A8;
    }
    .message-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 16pt;
    }
    .main-message {
      font-size: 20pt;
      font-weight: 700;
      line-height: 1.4;
      color: #FFFFFF;
      word-break: keep-all;
    }
    .sub-message {
      font-size: 12pt;
      color: #A5B3C6;
      word-break: keep-all;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-top: 1px solid #15202F;
      padding-top: 16pt;
    }
    .contact-info {
      display: flex;
      gap: 24pt;
    }
    .contact-item {
      display: flex;
      flex-direction: column;
      gap: 2pt;
    }
    .contact-label {
      font-size: 10pt;
      color: #A5B3C6;
    }
    .contact-val {
      font-size: 10pt;
      font-weight: 500;
      color: #FFFFFF;
    }
  </style>
</head>
<body>
  <div class="header">
    MD PREFLIGHT
  </div>

  <div class="message-area">
    <h2 class="main-message">경청해 주셔서 감사합니다.</h2>
    <p class="sub-message">MD Preflight는 결정론적 안전성과 생성형 AI의 설명력을 결합한 가장 안전한 유통 운영 도구입니다.</p>
  </div>

  <div class="footer">
    <div class="contact-info">
      <div class="contact-item">
        <span class="contact-label">GitHub</span>
        <span class="contact-val">github.com/cidtw/md-preflight</span>
      </div>
      <div class="contact-item">
        <span class="contact-label">Email</span>
        <span class="contact-val">taewon1119@gmail.com</span>
      </div>
    </div>
    <div style="font-size: 10pt; color: #A5B3C6; text-align: right;">
      <p>© 2026 MD Preflight. All rights reserved.</p>
    </div>
  </div>
</body>
</html>
