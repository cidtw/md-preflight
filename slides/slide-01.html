<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Manrope', 'Pretendard', sans-serif;
      background: #030414;
      color: #FFFFFF;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }
    .eyebrow {
      font-size: 10pt;
      font-weight: 600;
      color: #0028A8;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .title-area {
      margin-top: 40pt;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .main-title {
      font-size: 32pt;
      font-weight: 700;
      line-height: 1.4;
      letter-spacing: -0.02em;
      color: #FFFFFF;
      word-break: keep-all;
    }
    .sub-title {
      font-size: 13pt;
      font-weight: 400;
      color: #A5B3C6;
      margin-top: 10pt;
      word-break: keep-all;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-top: 1px solid #15202F;
      padding-top: 16pt;
    }
    .presenter {
      font-size: 11pt;
      font-weight: 600;
      color: #FFFFFF;
      word-break: keep-all;
    }
    .meta-item {
      font-size: 10pt;
      color: #A5B3C6;
      text-align: right;
    }
  </style>
</head>
<body>
  <div>
    <span class="eyebrow">Project Completion Briefing</span>
  </div>

  <div class="title-area">
    <h1 class="main-title">유통 프로모션 검수 엔진 'MD Preflight'</h1>
    <p class="sub-title">결정론적 규칙 검수와 AI 서술이 결합된 하이브리드 검수 시스템</p>
  </div>

  <div class="footer">
    <div>
      <p class="presenter">발표자: 권태원 (SaaS Platformer)</p>
    </div>
    <div class="meta-item">
      <p>SGAEM Live Deployment Session</p>
      <p style="margin-top: 2pt;">2026. 07. 10</p>
    </div>
  </div>
</body>
</html>
