<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 720pt; height: 405pt;
  font-family: 'Pretendard', -apple-system, sans-serif;
  background: #F5F5F0; color: #1A1A1A;
  padding: 34pt 42pt 28pt;
  overflow: hidden;
  display: flex; flex-direction: column;
}
.eyebrow {
  font-size: 10pt; font-weight: 600; color: #666666;
  letter-spacing: 0.1em; text-transform: uppercase;
}
h1 {
  font-size: 22pt; font-weight: 700; letter-spacing: -0.02em;
  line-height: 1.28; word-break: keep-all; margin-top: 8pt;
}
.key {
  font-size: 12pt; font-weight: 500; color: #666666;
  line-height: 1.4; margin-top: 0; word-break: keep-all; max-width: 640pt; flex-shrink: 0;
}
.main { flex: 1; margin-top: 12pt; min-height: 0; display: flex; flex-direction: column; gap: 10pt; overflow: hidden; }
.footer {
  display: flex; justify-content: space-between; align-items: center;
  border-top: 1px solid #D4D4D0; padding-top: 10pt; margin-top: auto;
  font-size: 10pt; color: #999999; flex-shrink: 0;
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12pt; height: auto; align-content: start; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10pt; height: auto; align-content: start; }
.card {
  background: #E8E8E3; border-radius: 6pt; padding: 12pt 14pt;
  display: flex; flex-direction: column; gap: 5pt;
  height: auto; min-height: 0;
}
.card h3 { font-size: 12pt; font-weight: 700; word-break: keep-all; }
.card p, .card li { font-size: 11pt; color: #666666; line-height: 1.4; word-break: keep-all; }
.card ul { margin-left: 12pt; list-style: disc; }
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10pt; }
.stat {
  background: #E8E8E3; border-radius: 6pt; padding: 14pt 12pt;
  display: flex; flex-direction: column; gap: 4pt;
}
.stat .n { font-size: 22pt; font-weight: 700; letter-spacing: -0.02em; }
.stat .l { font-size: 10pt; color: #666666; line-height: 1.3; word-break: keep-all; }
.list { list-style: none; display: flex; flex-direction: column; gap: 8pt; }
.list li {
  font-size: 12.5pt; line-height: 1.4; word-break: keep-all;
  padding-left: 14pt; position: relative;
}
.list li::before {
  content: ""; position: absolute; left: 0; top: 7pt;
  width: 5pt; height: 5pt; border-radius: 50%; background: #1A1A1A;
}
.flow { display: flex; align-items: stretch; gap: 8pt; height: auto; }
.flow-step {
  flex: 1; background: #E8E8E3; border-radius: 6pt; padding: 14pt;
  display: flex; flex-direction: column; gap: 8pt;
}
.flow-step .num {
  font-size: 10pt; font-weight: 700; color: #666; letter-spacing: 0.06em;
}
.flow-step h3 { font-size: 13pt; font-weight: 700; word-break: keep-all; }
.flow-step p { font-size: 11pt; color: #666; line-height: 1.4; word-break: keep-all; }
.arrow { display: flex; align-items: center; color: #999; font-size: 16pt; font-weight: 300; }
.chip-row { display: flex; flex-wrap: wrap; gap: 6pt; margin-top: 0; flex-shrink: 0; }
.chip {
  font-size: 10pt; font-weight: 600; padding: 4pt 10pt;
  border-radius: 999pt; background: #1A1A1A; color: #F5F5F0;
}
.chip.ghost { background: transparent; border: 1px solid #D4D4D0; color: #1A1A1A; }
.formula {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 10.5pt; line-height: 1.5; background: #E8E8E3;
  border-radius: 6pt; padding: 12pt 14pt; word-break: break-word;
}
.steps { display: flex; flex-direction: column; gap: 7pt; }
.step {
  display: grid; grid-template-columns: 28pt 1fr; gap: 10pt; align-items: start;
}
.step .i {
  width: 24pt; height: 24pt; border-radius: 50%; background: #1A1A1A; color: #F5F5F0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11pt; font-weight: 700;
}
.step p { font-size: 11.5pt; line-height: 1.4; word-break: keep-all; padding-top: 3pt; }
.col-title {
  font-size: 11pt; font-weight: 700; color: #666;
  letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6pt;
}
.muted { color: #666666; }
.strong { font-weight: 700; color: #1A1A1A; }
.agenda-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10pt 24pt;
  list-style: none; height: auto; align-content: start;
}
.agenda-grid li {
  display: grid; grid-template-columns: 28pt 1fr; gap: 10pt;
  padding: 10pt 0; border-bottom: 1px solid #E0E0DA;
  align-items: center;
}
.agenda-grid .n {
  font-size: 16pt; font-weight: 700; letter-spacing: -0.02em;
}
.agenda-grid .t { font-size: 13pt; font-weight: 600; word-break: keep-all; line-height: 1.35; }
.timeline {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10pt; height: auto; align-content: start;
}
.tl {
  background: #E8E8E3; border-radius: 6pt; padding: 12pt 14pt;
  display: flex; flex-direction: column; gap: 6pt;
  height: auto; min-height: 0;
}
.tl .phase {
  font-size: 10pt; font-weight: 700; color: #666; letter-spacing: 0.06em;
  text-transform: uppercase;
}
.tl h3 { font-size: 13pt; font-weight: 700; word-break: keep-all; }
.tl p { font-size: 11pt; color: #666; line-height: 1.4; word-break: keep-all; }
.chart-wrap { width: 100%; height: 150pt; position: relative; flex-shrink: 0; }

</style>
</head>
<body>

  <div>
    <div class="eyebrow">Quality</div>
    <h1 style="font-size:17pt;">제품이 바뀌어도 측정 가능한 품질 습관은 유지했다</h1>
  </div>
  <div class="main" style="display:grid;grid-template-columns:1.15fr 0.85fr;gap:14pt;align-items:start;">
    <div class="chart-wrap">
      <canvas id="pytestChart"></canvas>
    </div>
    <div style="display:flex;flex-direction:column;gap:8pt;">
      <div class="stat" style="padding:12pt;">
        <div class="n" style="font-size:20pt;">85</div>
        <div class="l">현행 tip pytest (7/20)</div>
      </div>
      <div class="card" style="padding:12pt;flex:1;">
        <h3>계약</h3>
        <p>결정론 · 예시 문장 하드코딩 금지</p>
        <p>LT 미조정 · ROP = D_eff×LT+SS</p>
        <p>시뮬 단일 쇼크 · ruff · basedpyright 0</p>
      </div>
    </div>
  </div>

  <script>
  (() => {
    const ctx = document.getElementById('pytestChart');
    if (!ctx || typeof Chart === 'undefined') return;
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['v1 peak', 'pivot 골격', 'ROP ops', 'IX 7/16', '7/20 tip'],
        datasets: [{
          label: 'pytest',
          data: [150, 12, 32, 47, 85],
          backgroundColor: '#1A1A1A',
          borderRadius: 4,
          maxBarThickness: 36
        }]
      },
      options: {
        animation: false,
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          title: {
            display: true,
            text: 'pytest 궤적 (일지 수치만)',
            color: '#666',
            font: { size: 12, family: 'Pretendard' }
          }
        },
        scales: {
          x: {
            ticks: { color: '#666', font: { size: 10, family: 'Pretendard' } },
            grid: { display: false }
          },
          y: {
            beginAtZero: true,
            ticks: { color: '#666', font: { size: 10, family: 'Pretendard' } },
            grid: { color: '#E0E0DA' }
          }
        }
      }
    });
  })();
  </script>
  <div class="footer">
    <span>발주맞춤 · OrderFit · pivot/project-direction</span>
    <span>11 / 14</span>
  </div>
</body>
</html>
